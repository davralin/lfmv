name: Weekly Image Scan

on:
  schedule:
    - cron: '0 9 * * 0'  # Sunday 09:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
          format: sarif
          output: trivy-weekly.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: trivy-weekly.sarif
          category: trivy-weekly

      - name: Grype — image scan
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7.4.0
        with:
          image: ghcr.io/${{ github.repository }}:latest
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-weekly
