name: Weekly Trivy Scan

on:
  schedule:
    - cron: '0 9 * * 0'  # Sunday 09:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      security-events: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        env:
          TRIVY_SKIP_VERSION_CHECK: "true"
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository }}:latest
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
          exit-code: '1'
          format: sarif
          output: trivy-weekly.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        with:
          sarif_file: trivy-weekly.sarif
          category: trivy-weekly
